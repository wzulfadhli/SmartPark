<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zone Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="theme.css">

    <style>
        body {
            padding: 24px;
            overflow-y: auto;
        }

        /* Scrollable table with fixed height */
        .table-scroll {
            max-height: 360px;
            overflow-y: auto;
        }
        .table-scroll thead th {
            position: sticky;
            top: 0;
            background-color: var(--surface-color);
            z-index: 2;
            box-shadow: 0 2px 0 var(--border-color);
        }
        [data-theme="dark"] .table-scroll thead th {
            background-color: #1e293b;
            box-shadow: 0 2px 0 #334155;
        }

        /* Table filter bar */
        .table-filters {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--surface-color);
            align-items: center;
            flex-wrap: wrap;
        }
        .table-filters select, .table-filters input {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .table-filters select:focus, .table-filters input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .filter-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: auto;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            /* Responsive table → card layout on mobile */
            .table-dark-custom {
                background-color: transparent !important;
                border: none !important;
                box-shadow: none !important;
            }

            .table-dark-custom .card-body {
                background-color: transparent !important;
                padding: 0 !important;
            }

            .table-dark-custom .table-responsive {
                overflow: visible !important;
            }

            .table-dark-custom .table,
            .table-dark-custom thead,
            .table-dark-custom tbody,
            .table-dark-custom tr,
            .table-dark-custom td {
                display: block;
                width: 100%;
            }

            .table-dark-custom thead {
                display: none;
            }

            .table-dark-custom tr {
                background-color: var(--surface-color);
                border: 1px solid var(--border-color) !important;
                border-radius: 20px !important;
                margin-bottom: 16px;
                padding: 16px;
                box-shadow: var(--card-shadow);
            }

            [data-theme="dark"] .table-dark-custom tr {
                background-color: #1e293b !important;
                border: 1px solid #334155 !important;
            }

            .table-dark-custom td {
                text-align: right !important;
                padding: 8px 0 !important;
                border: none !important;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.9rem !important;
            }

            .table-dark-custom td::before {
                content: attr(data-label);
                font-weight: 700;
                color: var(--text-secondary);
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .table-dark-custom td.text-end {
                justify-content: flex-end;
                gap: 10px;
                margin-top: 10px;
                padding-top: 15px !important;
                border-top: 1px solid var(--border-color) !important;
            }

            [data-theme="dark"] .table-dark-custom td.text-end {
                border-top: 1px solid #334155 !important;
            }
        }
    </style>
</head>

<body>
    <!-- Apply theme from parent shell -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <!-- Summary Stats -->
    <h5 class="mb-3">Summary Statistics</h5>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Total Zones</p>
                        <h2 class="mb-0 fw-bold" id="totalZones">0</h2>
                    </div>
                    <div class="stat-icon bg-light text-secondary">
                        <i class="bi bi-geo-alt fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Total Lots</p>
                        <h2 class="mb-0 fw-bold" id="totalLots">0</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#3b4256;color:white;">
                        <i class="bi bi-p-square-fill fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Active Sessions</p>
                        <h2 class="mb-0 fw-bold" id="activeSessions">0</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#d1fae5;color:#10b981;">
                        <i class="bi bi-car-front-fill fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Avg Compliance</p>
                        <h2 class="mb-0 fw-bold" id="avgCompliance">0%</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#fecaca;color:#ef4444;">
                        <i class="bi bi-graph-up-arrow fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Sessions Table -->
    <h5 class="mb-3 mt-2">Active Payment Sessions</h5>
    <div class="row mb-4">
        <div class="col-12">
            <div class="card table-dark-custom">
                <div class="table-filters">
                    <select id="filterZone">
                        <option value="">All Zones</option>
                        <option value="outside">Outside Zone</option>
                    </select>
                    <select id="filterStatus">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <input type="text" id="filterSearch" placeholder="Search vehicle or session...">
                    <span class="filter-count" id="filterCount"></span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive table-scroll">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Session ID</th>
                                    <th>Zone</th>
                                    <th>Vehicle</th>
                                    <th>Start Time</th>
                                    <th>Duration</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="activeSessionsTable">
                                <tr>
                                    <td colspan="6" class="text-center text-muted py-4">No active sessions</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Zones Grid -->
    <div class="row">
        <div class="col-12 mb-3">
            <h5 class="mb-2">Geofenced Zones</h5>
            <div class="row" id="zonesGrid"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="geofencing-utils.js"></script>
    <script src="compliance-utils.js"></script>
    <script src="dummy-data.js"></script>
    <script src="app.js"></script>

    <script>
        // COMPLIANCE_THRESHOLDS is provided as a global by app.js (already loaded above).

        // True if session is paid AND currently within its time window
        function isSessionActiveNow(s, now) {
            return s.status === 'active' && now >= s.startTime && now <= s.endTime;
        }

        // Returns the zone that GPS-contains the session
        function resolveSessionZone(session, zones) {
            if (session.location && session.location.lat != null) {
                return findZoneForCoords(session.location, zones);
            }
            return null;
        }

        // Update monitor with zones and payment sessions
        function updateMonitor() {
            const zones = window.ZONES || [];
            const sessions = window.PAYMENT_SESSIONS || [];
            const now = Date.now();

            // Bucket each truly-active session by its containing zone (GPS, not stored zoneId)
            const activeByZone = {};
            const trulyActive = [];
            sessions.forEach(s => {
                if (!isSessionActiveNow(s, now)) return;
                trulyActive.push(s);
                const z = resolveSessionZone(s, zones);
                if (z) activeByZone[z.id] = (activeByZone[z.id] || 0) + 1;
            });

            // Summary stats
            const totalLots = zones.reduce((sum, zone) => sum + zone.totalLots, 0);
            let totalCompliance = 0;
            zones.forEach(zone => {
                const activeInZone = activeByZone[zone.id] || 0;
                totalCompliance += calculateComplianceRate(activeInZone, zone.totalLots);
            });
            const avgCompliance = zones.length > 0 ? totalCompliance / zones.length : 0;

            document.getElementById('totalZones').textContent = zones.length;
            document.getElementById('totalLots').textContent = totalLots;
            document.getElementById('activeSessions').textContent = trulyActive.length;
            document.getElementById('avgCompliance').textContent = avgCompliance.toFixed(1) + '%';

            // Populate zone filter dropdown
            const zoneFilter = document.getElementById('filterZone');
            const currentZoneVal = zoneFilter.value;
            zoneFilter.innerHTML = '<option value="">All Zones</option><option value="outside">Outside Zone</option>';
            zones.forEach(z => {
                zoneFilter.innerHTML += `<option value="${z.id}">${z.name}</option>`;
            });
            if (currentZoneVal) zoneFilter.value = currentZoneVal;

            // Apply filters
            const statusVal = document.getElementById('filterStatus').value;
            const searchVal = document.getElementById('filterSearch').value.trim().toLowerCase();
            const filtered = trulyActive.filter(s => {
                const containingZone = resolveSessionZone(s, zones);
                if (zoneFilter.value === 'outside') {
                    if (containingZone) return false;
                } else if (zoneFilter.value && (!containingZone || containingZone.id !== zoneFilter.value)) return false;
                if (statusVal && s.status !== statusVal) return false;
                if (searchVal) {
                    const hay = ((s.sessionId || '') + ' ' + (s.vehicleId || '')).toLowerCase();
                    if (!hay.includes(searchVal)) return false;
                }
                return true;
            });
            document.getElementById('filterCount').textContent =
                filtered.length === trulyActive.length ? `${trulyActive.length} sessions` : `${filtered.length} of ${trulyActive.length}`;

            // Active sessions table
            try {
                const tbody = document.getElementById('activeSessionsTable');
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No active sessions</td></tr>';
                } else {
                    tbody.innerHTML = filtered.map(s => {
                        const startTime = new Date(s.startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const containingZone = resolveSessionZone(s, zones);
                        const zoneLabel = containingZone ? containingZone.name : '<span class="text-danger">Outside</span>';
                        const badge = '<span class="badge bg-success">Active</span>';
                        const sid = (s.sessionId || '').toString();
                        return `<tr>
                            <td class="small">${sid.substring(0, 12)}...</td>
                            <td>${zoneLabel}</td>
                            <td>${s.vehicleId || 'N/A'}</td>
                            <td>${startTime}</td>
                            <td>${s.durationMinutes} min</td>
                            <td>${badge}</td>
                        </tr>`;
                    }).join('');
                }
            } catch (err) {
                console.error('[Monitor] Failed to render active sessions table:', err);
                document.getElementById('activeSessionsTable').innerHTML =
                    `<tr><td colspan="6" class="text-danger py-4">Render error: ${err.message}</td></tr>`;
            }

            // Zones grid
            try {
                const zonesGrid = document.getElementById('zonesGrid');
                zonesGrid.innerHTML = zones.map(zone => {
                    const activeInZone = activeByZone[zone.id] || 0;
                    const complianceRate = calculateComplianceRate(activeInZone, zone.totalLots);
                    const statusColor = getComplianceStatusColor(complianceRate, COMPLIANCE_THRESHOLDS);
                    return `<div class="col-6 col-md-4 mb-3">
                        <div class="card h-100" style="border-left: 4px solid ${getStatusColorHex(statusColor)};">
                            <div class="card-body">
                                <h6 class="card-title fw-bold mb-2" style="color: var(--text-primary);">${zone.name}</h6>
                                <div class="small text-muted">Total: ${zone.totalLots} lots</div>
                                <div class="small text-muted">Active: ${activeInZone} sessions</div>
                                <div class="small fw-bold" style="color: ${getStatusColorHex(statusColor)};">${complianceRate.toFixed(1)}% compliance</div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error('[Monitor] Failed to render zones grid:', err);
                document.getElementById('zonesGrid').innerHTML =
                    `<div class="col-12 text-danger">Render error: ${err.message}</div>`;
            }
        }

        function getStatusColorHex(statusColor) {
            const colors = { green: '#10b981', orange: '#f59e0b', red: '#ef4444' };
            return colors[statusColor] || '#6b7280';
        }

        // Re-render when app.js dispatches data updates (e.g., Firebase changes)
        window.addEventListener('parkingDataUpdated', updateMonitor);

        // Listen for commands from parent shell (simulate, reset, refresh, theme)
        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.type) return;
            switch (e.data.type) {
                case 'refresh': updateMonitor(); break;
                case 'theme':
                    document.documentElement.setAttribute('data-theme', e.data.value);
                    updateMonitor();
                    break;
            }
        });

        // Initial load
        // Directly load dummy data if available
        if (typeof DUMMY_ZONES !== 'undefined') {
            window.ZONES = DUMMY_ZONES;
            console.log('[Monitor] Loaded dummy zones:', window.ZONES.length);
        }
        if (typeof DUMMY_PAYMENT_SESSIONS !== 'undefined') {
            window.PAYMENT_SESSIONS = DUMMY_PAYMENT_SESSIONS;
            console.log('[Monitor] Loaded dummy payment sessions:', window.PAYMENT_SESSIONS.length);
        }
        // Filter listeners
        document.getElementById('filterZone').addEventListener('change', updateMonitor);
        document.getElementById('filterStatus').addEventListener('change', updateMonitor);
        document.getElementById('filterSearch').addEventListener('input', updateMonitor);

        setTimeout(updateMonitor, 1000);
        setInterval(updateMonitor, 30000);
    </script>
</body>

</html>
