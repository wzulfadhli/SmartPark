<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="theme.css">

    <style>
        body {
            padding: 24px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            /* Responsive table → card layout on mobile */
            .table-dark-custom {
                background-color: transparent !important;
                border: none !important;
                box-shadow: none !important;
            }

            .table-dark-custom .card-body {
                background-color: transparent !important;
                padding: 0 !important;
            }

            .table-dark-custom .table-responsive {
                overflow: visible !important;
            }

            .table-dark-custom .table,
            .table-dark-custom thead,
            .table-dark-custom tbody,
            .table-dark-custom tr,
            .table-dark-custom td {
                display: block;
                width: 100%;
            }

            .table-dark-custom thead {
                display: none;
            }

            .table-dark-custom tr {
                background-color: var(--surface-color);
                border: 1px solid var(--border-color) !important;
                border-radius: 20px !important;
                margin-bottom: 16px;
                padding: 16px;
                box-shadow: var(--card-shadow);
            }

            [data-theme="dark"] .table-dark-custom tr {
                background-color: #1e293b !important;
                border: 1px solid #334155 !important;
            }

            .table-dark-custom td {
                text-align: right !important;
                padding: 8px 0 !important;
                border: none !important;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.9rem !important;
            }

            .table-dark-custom td::before {
                content: attr(data-label);
                font-weight: 700;
                color: var(--text-secondary);
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .table-dark-custom td.text-end {
                justify-content: flex-end;
                gap: 10px;
                margin-top: 10px;
                padding-top: 15px !important;
                border-top: 1px solid var(--border-color) !important;
            }

            [data-theme="dark"] .table-dark-custom td.text-end {
                border-top: 1px solid #334155 !important;
            }
        }
    </style>
</head>

<body>
    <!-- Apply theme from parent shell -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <!-- Summary Stats -->
    <h5 class="mb-3">Summary Statistics</h5>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Total Bays</p>
                        <h2 class="mb-0 fw-bold" id="totalBays">8</h2>
                    </div>
                    <div class="stat-icon bg-light text-secondary">
                        <i class="bi bi-car-front fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Occupied</p>
                        <h2 class="mb-0 fw-bold" id="occupiedBays">0</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#3b4256;color:white;">
                        <i class="bi bi-car-front-fill fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Available</p>
                        <h2 class="mb-0 fw-bold" id="availableBays">8</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#d1fae5;color:#10b981;">
                        <i class="bi bi-car-front fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Violations</p>
                        <h2 class="mb-0 fw-bold" id="violationCount">0</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#fecaca;color:#ef4444;">
                        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Sessions Table -->
    <h5 class="mb-3 mt-2">Active Sessions</h5>
    <div class="row mb-4">
        <div class="col-12">
            <div class="card table-dark-custom">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Bay ID</th>
                                    <th>Location</th>
                                    <th>Start Time</th>
                                    <th>Duration</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="activeSessionsTable">
                                <tr>
                                    <td colspan="7" class="text-center text-muted py-4">No active sessions</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bays Grid + Enforcer Panel -->
    <div class="row">
        <div class="col-md-8 mb-3">
            <h5 class="mb-2">Parking Bays</h5>
            <div class="row" id="baysGrid"></div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header py-2" style="background-color: var(--accent-danger) !important; color: white;">
                    <h6 class="mb-0">
                        <i class="bi bi-shield-fill"></i> Enforcer Panel
                        <span class="badge bg-light text-dark ms-2" id="alertBadge">0</span>
                    </h6>
                </div>
                <div class="card-body" style="max-height: 400px; overflow-y: auto;" id="enforcerPanel">
                    <p class="text-muted text-center small">No active violations</p>
                </div>
                <div class="card-footer p-2">
                    <button class="btn btn-success btn-sm w-100" onclick="compoundAllViolations()">
                        <i class="bi bi-shield-fill"></i> Compound All
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
        preload="auto"></audio>

    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>

    <script>
        // Listen for commands from parent shell (simulate, reset, refresh, theme)
        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.type) return;
            switch (e.data.type) {
                case 'simulate': simulateRandomCar(); break;
                case 'reset': resetAllBays(); break;
                case 'refresh': refreshData(); break;
                case 'theme':
                    document.documentElement.setAttribute('data-theme', e.data.value);
                    break;
            }
        });
    </script>
</body>

</html>
