<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zone Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../src/theme.css">

    <style>
        body {
            padding: 24px;
            overflow-y: auto;
        }

        /* Scrollable table with fixed height */
        .table-scroll {
            max-height: 360px;
            overflow-y: auto;
        }
        .table-scroll thead th {
            position: sticky;
            top: 0;
            background-color: var(--surface-color);
            z-index: 2;
            box-shadow: 0 2px 0 var(--border-color);
        }
        [data-theme="dark"] .table-scroll thead th {
            background-color: #1e293b;
            box-shadow: 0 2px 0 #334155;
        }

        /* Table filter bar */
        .table-filters {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--surface-color);
            align-items: center;
            flex-wrap: wrap;
        }
        .table-filters select, .table-filters input {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .table-filters select:focus, .table-filters input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .filter-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            /* Smaller KPI values on mobile */
            .card h2 {
                font-size: 1.4rem;
            }
            .stat-icon {
                width: 28px;
                height: 28px;
                border-radius: 8px;
            }
            .stat-icon i {
                font-size: 0.9rem !important;
            }

            /* Stack filter bar on mobile */
            .table-filters {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 10px 12px;
            }
            .table-filters select,
            .table-filters input {
                width: 100%;
                font-size: 0.8rem;
            }
            .filter-count {
                margin-left: 0;
                text-align: center;
                font-size: 0.75rem;
            }

            /* Smaller table cells for horizontal scroll */
            .table td, .table th {
                font-size: 0.8rem;
                padding: 8px 10px;
                white-space: nowrap;
            }

            /* Zone cards full-width on mobile */
            #zonesGrid .col-6 {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Apply theme from parent shell -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <!-- Summary Stats -->
    <h5 class="mb-3">Summary Statistics</h5>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Total Zones</p>
                        <h2 class="mb-0 fw-bold skeleton skeleton-text" id="totalZones">&nbsp;</h2>
                    </div>
                    <div class="stat-icon bg-light text-secondary">
                        <i class="bi bi-geo-alt fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Total Lots</p>
                        <h2 class="mb-0 fw-bold skeleton skeleton-text" id="totalLots">&nbsp;</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#3b4256;color:white;">
                        <i class="bi bi-p-square-fill fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Active Sessions</p>
                        <h2 class="mb-0 fw-bold skeleton skeleton-text" id="activeSessions">&nbsp;</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#d1fae5;color:#10b981;">
                        <i class="bi bi-car-front-fill fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 fw-bold small">Avg Compliance</p>
                        <h2 class="mb-0 fw-bold skeleton skeleton-text" id="avgCompliance">&nbsp;</h2>
                    </div>
                    <div class="stat-icon" style="background-color:#fecaca;color:#ef4444;">
                        <i class="bi bi-graph-up-arrow fs-5"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Sessions Table -->
    <h5 class="mb-3 mt-2">Active Payment Sessions</h5>
    <div class="row mb-4">
        <div class="col-12">
            <div class="card table-dark-custom">
                <div class="table-filters">
                    <select id="filterZone">
                        <option value="">All Zones</option>
                        <option value="outside">Outside Zone</option>
                    </select>
                    <select id="filterStatus">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <input type="date" id="filterDate" title="Filter by date">
                    <input type="text" id="filterSearch" placeholder="Search vehicle or session...">
                    <span class="filter-count" id="filterCount"></span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive table-scroll">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Session ID</th>
                                    <th>Date</th>
                                    <th>Zone</th>
                                    <th>Vehicle</th>
                                    <th>Start Time</th>
                                    <th>Duration</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="activeSessionsTable">
                                <tr class="skeleton-row">
                                    <td colspan="7" class="py-3">
                                        <div class="skeleton skeleton-text" style="width:100%;"></div>
                                        <div class="skeleton skeleton-text" style="width:90%;"></div>
                                        <div class="skeleton skeleton-text" style="width:70%;"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Zones Grid -->
    <div class="row">
        <div class="col-12 mb-3">
            <h5 class="mb-2">Geofenced Zones</h5>
            <div class="row" id="zonesGrid">
                <div class="col-md-4 skeleton-zone-col">
                    <div class="card p-3">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text" style="width:80%"></div>
                        <div class="skeleton skeleton-text" style="width:50%"></div>
                    </div>
                </div>
                <div class="col-md-4 skeleton-zone-col">
                    <div class="card p-3">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text" style="width:80%"></div>
                        <div class="skeleton skeleton-text" style="width:50%"></div>
                    </div>
                </div>
                <div class="col-md-4 skeleton-zone-col">
                    <div class="card p-3">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text" style="width:80%"></div>
                        <div class="skeleton skeleton-text" style="width:50%"></div>
                    </div>
                </div>
            </div>
            <div class="empty-state-box skeleton-hidden" id="zonesEmptyState">
                <i class="bi bi-geo-alt"></i>
                <div class="fw-bold mb-1">No zones available</div>
                <div class="small">Zones will appear here once loaded.</div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../src/config.js"></script>
    <script src="../src/zones-config.js"></script>
    <script src="../src/session-utils.js"></script>
    <script src="../src/geofencing-utils.js?v=2"></script>
    <script src="../src/compliance-utils.js"></script>
    <script src="../src/dummy-data.js"></script>
    <script src="../src/app.js"></script>
    <script src="../src/ui-helpers.js"></script>

    <script>
        // Shared helpers: toMillis, isSessionActiveNow, resolveSessionZone,
        // bucketActiveByZone, getStatusColorHex are provided as globals by ui-helpers.js.

        // Update monitor with zones and payment sessions
        function updateMonitor() {
            const zones = window.ZONES || [];
            const sessions = window.PAYMENT_SESSIONS || [];
            const now = Date.now();

            // Remove skeletons once data is available
            document.querySelectorAll('.skeleton').forEach(el => el.classList.remove('skeleton', 'skeleton-text', 'skeleton-title'));
            document.querySelectorAll('.skeleton-row').forEach(el => el.remove());

            // Toggle empty state for zones grid
            const hasZones = zones.length > 0;
            document.getElementById('zonesEmptyState').classList.toggle('skeleton-hidden', hasZones);
            document.querySelectorAll('.skeleton-zone-col').forEach(el => {
                el.style.display = hasZones ? 'none' : '';
            });

            // Single bucketing pass via UIHelpers
            const { activeByZone, totalActive } = bucketActiveByZone(sessions, zones, now);

            // Summary stats
            const totalLots = zones.reduce((sum, zone) => sum + zone.totalLots, 0);
            let totalCompliance = 0;
            zones.forEach(zone => {
                const activeInZone = activeByZone[zone.id] || 0;
                totalCompliance += calculateComplianceRate(activeInZone, zone.totalLots);
            });
            const avgCompliance = zones.length > 0 ? totalCompliance / zones.length : 0;

            document.getElementById('totalZones').textContent = zones.length;
            document.getElementById('totalLots').textContent = totalLots;
            document.getElementById('activeSessions').textContent = totalActive;
            document.getElementById('avgCompliance').textContent = avgCompliance.toFixed(1) + '%';

            // Populate zone filter dropdown via UIHelpers
            const zoneFilter = document.getElementById('filterZone');
            UIHelpers.populateZoneFilter(zoneFilter, zones, true);

            // Apply filters via UIHelpers
            const filtered = UIHelpers.filterSessions(sessions, {
                zones: zones,
                zoneFilterValue: zoneFilter.value,
                statusFilterValue: document.getElementById('filterStatus').value,
                dateFilterValue: document.getElementById('filterDate').value,
                searchValue: document.getElementById('filterSearch').value,
                onlyActive: true
            });
            document.getElementById('filterCount').textContent =
                filtered.length === totalActive ? `${totalActive} sessions` : `${filtered.length} of ${totalActive}`;

            // Active sessions table
            try {
                const tbody = document.getElementById('activeSessionsTable');
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No active sessions</td></tr>';
                } else {
                    tbody.innerHTML = filtered.map(s => {
                        const dateStr = UIHelpers.formatDate(s.start_time);
                        const startTime = UIHelpers.formatTime(s.start_time);
                        const containingZone = resolveSessionZone(s, zones);
                        const zoneLabel = containingZone ? containingZone.name : '<span class="text-danger">Outside</span>';
                        const sid = (s.id || '').toString();
                        return `<tr>
                            <td class="small">${sid.substring(0, 12)}...</td>
                            <td class="text-muted">${dateStr}</td>
                            <td>${zoneLabel}</td>
                            <td>${s.vehicle_id || 'N/A'}</td>
                            <td>${startTime}</td>
                            <td>${s.duration_minutes} min</td>
                            <td>${UIHelpers.statusBadgeHtml(s.status)}</td>
                        </tr>`;
                    }).join('');
                }
            } catch (err) {
                console.error('[Monitor] Failed to render active sessions table:', err);
                document.getElementById('activeSessionsTable').innerHTML =
                    `<tr><td colspan="7" class="text-danger py-4">Render error: ${err.message}</td></tr>`;
            }

            // Zones grid
            try {
                const zonesGrid = document.getElementById('zonesGrid');
                zonesGrid.innerHTML = zones.map(zone => {
                    const activeInZone = activeByZone[zone.id] || 0;
                    const complianceRate = calculateComplianceRate(activeInZone, zone.totalLots);
                    const statusColor = getComplianceStatusColor(complianceRate, COMPLIANCE_THRESHOLDS);
                    return `<div class="col-6 col-md-4 mb-3">
                        <div class="card h-100" style="border-left: 4px solid ${getStatusColorHex(statusColor)};">
                            <div class="card-body">
                                <h6 class="card-title fw-bold mb-2" style="color: var(--text-primary);">${zone.name}</h6>
                                <div class="small text-muted">Total: ${zone.totalLots} lots</div>
                                <div class="small text-muted">Active: ${activeInZone} sessions</div>
                                <div class="small fw-bold" style="color: ${getStatusColorHex(statusColor)};">${complianceRate.toFixed(1)}% compliance</div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error('[Monitor] Failed to render zones grid:', err);
                document.getElementById('zonesGrid').innerHTML =
                    `<div class="col-12 text-danger">Render error: ${err.message}</div>`;
            }
        }

        // Re-render when app.js dispatches data updates (e.g., Firebase changes)
        window.addEventListener('parkingDataUpdated', updateMonitor);

        // Listen for commands from parent shell (simulate, reset, refresh, theme)
        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.type) return;
            switch (e.data.type) {
                case 'refresh': updateMonitor(); break;
                case 'simulate':
                    if (typeof DummyData !== 'undefined' && window.ZONES && window.ZONES.length) {
                        const seed = Date.now();
                        sessionStorage.setItem('dummySeed', seed);
                        const result = DummyData.generateSessions(window.ZONES, { seed: seed });
                        window.PAYMENT_SESSIONS = result.sessions;
                        window.dispatchEvent(new CustomEvent('parkingDataUpdated'));
                    }
                    break;
                case 'reset':
                    if (typeof DummyData !== 'undefined' && window.ZONES && window.ZONES.length) {
                        sessionStorage.removeItem('dummySeed');
                        const result = DummyData.generateSessions(window.ZONES); // default seed 12345
                        window.PAYMENT_SESSIONS = result.sessions;
                        window.dispatchEvent(new CustomEvent('parkingDataUpdated'));
                    }
                    break;
                case 'theme':
                    document.documentElement.setAttribute('data-theme', e.data.value);
                    updateMonitor();
                    break;
            }
        });

        // Initial load
        UIHelpers.bootstrapDummyData('Monitor');

        // Filter listeners
        document.getElementById('filterZone').addEventListener('change', updateMonitor);
        document.getElementById('filterStatus').addEventListener('change', updateMonitor);
        document.getElementById('filterDate').addEventListener('change', updateMonitor);
        document.getElementById('filterSearch').addEventListener('input', updateMonitor);

        setTimeout(updateMonitor, 1000);
        setInterval(updateMonitor, 30000);
    </script>
</body>

</html>
