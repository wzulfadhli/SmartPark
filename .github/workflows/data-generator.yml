# .github/workflows/data-generator.yml
# Runs the parking session data generator on a schedule using GitHub Actions
#
# This keeps your Firestore database populated with active sessions
# even when your local machine is off.
#
# The workflow:
#   1. Runs every 5 minutes
#   2. Writes the service account key to a temp file
#   3. Sets GOOGLE_APPLICATION_CREDENTIALS
#   4. Runs scripts/data-generator.js for 4 minutes then stops

name: SmartPark Data Generator

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  generate-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write service account key
        run: |
          mkdir -p .secrets
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > .secrets/serviceAccountKey.json

      - name: Run data generator (single shot)
        env:
          FIREBASE_PROJECT_ID: gpark-9eed8
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.secrets/serviceAccountKey.json
        run: node scripts/data-generator.js

      - name: Cleanup credentials
        if: always()
        run: rm -rf .secrets
