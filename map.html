<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartPark | Overlay Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="theme.css">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* ---- Floating Header/Title ---- */
        .dashboard-title {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            color: var(--accent-success);
            font-weight: 700;
            pointer-events: none;
            font-size: 0.82rem;
            letter-spacing: 1.5px;
            box-shadow: var(--card-shadow);
            text-transform: uppercase;
        }

        /* ---- Top KPI Overlay ---- */
        .kpi-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 1000;
            max-width: calc(100% - 40px);
            justify-content: flex-end;
        }

        /* Override theme.css .card for the map overlay cards */
        .kpi-overlay .kpi-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 12px;
            min-width: 100px;
            text-align: center;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
        }

        .kpi-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .kpi-value {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            color: var(--text-primary);
        }

        /* ---- Hotspot Sidebar Panel ---- */
        .hotspot-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 280px;
            max-width: calc(100% - 40px);
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow);
            overflow: hidden; /* clip the collapsing body */
        }

        /* ---- Clickable header row ---- */
        .hotspot-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.25s, background 0.15s;
            border-radius: 12px 12px 0 0;
        }
        .hotspot-panel-header:hover {
            background: var(--surface-hover);
        }
        .hotspot-panel.open .hotspot-panel-header {
            border-bottom-color: var(--border-color);
            border-radius: 12px 12px 0 0;
        }

        .hotspot-panel-title {
            font-size: 0.72rem;
            color: var(--accent-success);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
        }

        /* Chevron icon — rotates 180° when panel is open */
        .hotspot-chevron {
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .hotspot-panel.open .hotspot-chevron {
            transform: rotate(180deg);
        }

        /* ---- Collapsible body ---- */
        .hotspot-panel-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.35s ease;
            padding: 0 15px;
        }
        .hotspot-panel.open .hotspot-panel-body {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            padding: 12px 15px;
        }

        .hotspot-row {
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .hotspot-row:last-child {
            border: 0;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .street-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .progress-track {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .stat-line {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* ---- Layer toggle button ---- */
        .layer-toggle {
            position: absolute;
            top: 100px;
            left: 20px;
            z-index: 1000;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-primary);
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }
        .layer-toggle:hover { background: var(--surface-hover); }
        .layer-toggle.active {
            border-color: var(--accent-success);
            color: var(--accent-success);
        }
        .layer-toggle i { font-size: 0.95rem; }

        /* Payer marker pulse (in-zone) */
        .payer-icon {
            background: #6366f1;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 12px !important;
            height: 12px !important;
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            animation: payer-pulse 2s infinite;
        }
        @keyframes payer-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.6); }
            70%  { box-shadow: 0 0 0 8px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* Payer marker — outside any zone (NOT counted in compliance) */
        .payer-icon-outside {
            background: #ef4444;
            border: 2px dashed #fff;
            border-radius: 4px;
            width: 14px !important;
            height: 14px !important;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: payer-pulse-outside 2s infinite;
            transform: rotate(45deg);
        }
        @keyframes payer-pulse-outside {
            0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70%  { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* ---- Leaflet overrides ---- */
        .leaflet-control-zoom {
            border: none !important;
            margin-top: 20px !important;
        }

        .leaflet-control-zoom a {
            background-color: var(--surface-color) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }

        .leaflet-control-zoom a:hover {
            background-color: var(--surface-hover) !important;
        }

        .leaflet-control-attribution {
            background: var(--surface-color) !important;
            color: var(--text-secondary) !important;
        }

        .leaflet-control-attribution a {
            color: var(--accent-primary) !important;
        }

        /* Leaflet popup */
        .leaflet-popup-content-wrapper {
            background: var(--surface-color) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--card-shadow) !important;
            border-radius: 10px !important;
        }

        .leaflet-popup-tip {
            background: var(--surface-color) !important;
        }
    </style>
</head>

<body>
    <!-- Apply theme immediately from localStorage (same pattern as other pages) -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <div class="dashboard-title">GPS/Geofencing Parking Map</div>

    <div class="kpi-overlay">
        <div class="kpi-card">
            <div class="kpi-label">Total Zones</div>
            <div id="kpi-zones" class="kpi-value">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Active Sessions</div>
            <div id="kpi-sessions" class="kpi-value">0</div>
        </div>
        <div class="kpi-card" style="border-top: 3px solid var(--accent-success);">
            <div class="kpi-label">Avg Compliance</div>
            <div id="kpi-compliance" class="kpi-value">0%</div>
        </div>
        <div class="kpi-card" style="border-top: 3px solid #ef4444;" title="Active payers whose GPS location is outside any geofenced zone — not counted in compliance">
            <div class="kpi-label">Outside Zone</div>
            <div id="kpi-outside" class="kpi-value">0</div>
        </div>
    </div>

    <div class="hotspot-panel open" id="hotspotPanel">
        <div class="hotspot-panel-header" onclick="toggleHotspotPanel()" title="Toggle zone list">
            <span class="hotspot-panel-title">Zone Compliance Status</span>
            <i class="bi bi-chevron-up hotspot-chevron" id="hotspotChevron"></i>
        </div>
        <div class="hotspot-panel-body" id="hotspotBody">
            <div id="list-container"></div>
        </div>
    </div>

    <button class="layer-toggle" id="payerToggle" onclick="togglePayerLayer()" title="Toggle payer locations">
        <i class="bi bi-geo-alt-fill"></i>
        <span id="payerToggleLabel">Show Payers</span>
    </button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="geofencing-utils.js"></script>
    <script src="compliance-utils.js"></script>
    <script src="dummy-data.js"></script>
    <script src="app.js"></script>
    <script>
        // ---- Data ----
        // Zones will be loaded from Firebase (window.ZONES)
        // Payment sessions will be loaded from Firebase (window.PAYMENT_SESSIONS)

        // ---- Tile URLs ----
        const TILE_DARK = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        const TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        const TILE_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright"></a> <a href="https://carto.com/attributions"></a>';

        // ---- Map init ----
        const map = L.map('map', { zoomControl: true }).setView([3.07, 101.587], 15);

        let tileLayer = null;

        function applyTile(theme) {
            const url = theme === 'dark' ? TILE_DARK : TILE_LIGHT;
            if (tileLayer) map.removeLayer(tileLayer);
            tileLayer = L.tileLayer(url, {
                attribution: TILE_ATTR,
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        // Apply tile for current theme on load
        const initTheme = document.documentElement.getAttribute('data-theme') || 'light';
        applyTile(initTheme);

        // ---- Status helper ----
        function getComplianceStyle(complianceRate) {
            if (complianceRate >= 80) return { color: 'var(--accent-success)', hex: '#10b981', text: 'High' };
            if (complianceRate >= 50) return { color: 'var(--accent-warning)', hex: '#f59e0b', text: 'Medium' };
            return { color: 'var(--accent-danger)', hex: '#ef4444', text: 'Low' };
        }

        // ---- Render zones ----
        let zoneMarkers = [];
        let totalLots = 0, totalSessions = 0, totalCompliance = 0;

        // ---- Payer markers (individual active sessions) ----
        let payerLayer = L.layerGroup();
        let payersVisible = false;

        // Deterministic scatter so each session keeps the same offset across re-renders
        function scatterOffset(seed, radiusMeters) {
            // Hash seed string into 2 floats in [0,1)
            let h = 0;
            for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
            const r1 = ((h & 0xffff) / 0xffff);
            const r2 = (((h >>> 16) & 0xffff) / 0xffff);
            // Random point inside circle
            const angle = r1 * 2 * Math.PI;
            const dist = Math.sqrt(r2) * radiusMeters * 0.8; // 80% of radius
            // Convert meters to lat/lng deltas (rough)
            const dLat = (dist * Math.cos(angle)) / 111320;
            const dLng = (dist * Math.sin(angle)) / (111320 * Math.cos(0));
            return { dLat, dLng };
        }

        // Resolve a session's effective zone via geofence containment (GPS is source of truth).
        // If the session has no location, fall back to the declared zoneId.
        function resolveSessionZone(session, zones) {
            if (session.location && session.location.lat != null) {
                return findZoneContainingLocation(session.location, zones);
            }
            return zones.find(z => z.id === session.zoneId) || null;
        }

        function renderPayers() {
            payerLayer.clearLayers();
            const zones = window.ZONES || [];
            const sessions = window.PAYMENT_SESSIONS || [];

            const now = Date.now();
            sessions
                .filter(s => s.status === 'active' && now >= s.startTime && now <= s.endTime)
                .forEach(session => {
                const remainingMs = session.endTime - Date.now();
                const remainingMin = Math.max(0, Math.round(remainingMs / 60000));
                const containingZone = resolveSessionZone(session, zones);

                // Outside every geofence → red diamond marker
                if (!containingZone) {
                    const lat = session.location?.lat;
                    const lng = session.location?.lng;
                    if (lat == null || lng == null) return;

                    const icon = L.divIcon({
                        className: 'payer-icon-outside',
                        iconSize: [14, 14]
                    });
                    const marker = L.marker([lat, lng], { icon }).bindPopup(
                        `<b>${session.vehicleId || 'Vehicle'}</b><br>
                         <span style="color:#ef4444;font-weight:600;">⚠ Outside Geofenced Zone</span><br>
                         Session: ${session.sessionId.substr(0, 12)}…<br>
                         Remaining: ${remainingMin} min<br>
                         <small style="color:var(--text-secondary);">Not counted in zone compliance</small>`
                    );
                    payerLayer.addLayer(marker);
                    return;
                }

                // Inside a geofence → indigo dot (use real GPS, or scatter if at center)
                let lat = session.location?.lat ?? containingZone.center.lat;
                let lng = session.location?.lng ?? containingZone.center.lng;
                const isAtCenter = lat === containingZone.center.lat && lng === containingZone.center.lng;
                if (isAtCenter) {
                    const { dLat, dLng } = scatterOffset(session.sessionId, containingZone.radius || 50);
                    lat += dLat;
                    lng += dLng;
                }

                const mismatched = session.zoneId && session.zoneId !== containingZone.id;
                const icon = L.divIcon({
                    className: 'payer-icon',
                    iconSize: [12, 12]
                });
                const marker = L.marker([lat, lng], { icon }).bindPopup(
                    `<b>${session.vehicleId || 'Vehicle'}</b><br>
                     Zone: ${containingZone.name}<br>
                     Session: ${session.sessionId.substr(0, 12)}…<br>
                     Remaining: ${remainingMin} min
                     ${mismatched ? `<br><small style="color:#f59e0b;">⚠ Paid for ${session.zoneName || session.zoneId}, parked in ${containingZone.name}</small>` : ''}`
                );
                payerLayer.addLayer(marker);
            });
        }

        function togglePayerLayer() {
            payersVisible = !payersVisible;
            const btn = document.getElementById('payerToggle');
            const label = document.getElementById('payerToggleLabel');
            if (payersVisible) {
                renderPayers();
                payerLayer.addTo(map);
                btn.classList.add('active');
                label.textContent = 'Hide Payers';
            } else {
                map.removeLayer(payerLayer);
                btn.classList.remove('active');
                label.textContent = 'Show Payers';
            }
        }

        function renderZones() {
            const zones = window.ZONES || [];
            const sessions = window.PAYMENT_SESSIONS || [];
            const list = document.getElementById('list-container');

            // Clear existing markers
            zoneMarkers.forEach(marker => map.removeLayer(marker));
            zoneMarkers = [];
            list.innerHTML = '';

            totalLots = 0;
            totalSessions = 0;
            totalCompliance = 0;

            // Bucket each truly-active session (paid + within time window) into its
            // containing zone by GPS, not by stored zoneId.
            const now = Date.now();
            const activeByZone = {};
            let activeOutside = 0;
            sessions.forEach(s => {
                if (s.status !== 'active') return;
                if (now < s.startTime || now > s.endTime) return;
                const z = resolveSessionZone(s, zones);
                if (z) activeByZone[z.id] = (activeByZone[z.id] || 0) + 1;
                else activeOutside++;
            });

            zones.forEach(zone => {
                const activeInZone = activeByZone[zone.id] || 0;
                const complianceRate = (activeInZone / zone.totalLots) * 100;
                const style = getComplianceStyle(complianceRate);

                totalLots += zone.totalLots;
                totalSessions += activeInZone;
                totalCompliance += complianceRate;

                // Circle marker for zone center
                const marker = L.circleMarker([zone.center.lat, zone.center.lng], {
                    radius: 14,
                    fillColor: style.hex,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.75
                }).addTo(map).bindPopup(
                    `<b>${zone.name}</b><br>
                     Total Lots: ${zone.totalLots}<br>
                     Active Sessions: ${activeInZone}<br>
                     Compliance: ${complianceRate.toFixed(1)}%<br>
                     Status: ${style.text}`
                );

                // Add geofence circle
                const geofence = L.circle([zone.center.lat, zone.center.lng], {
                    radius: zone.radius,
                    fillColor: style.hex,
                    color: style.hex,
                    weight: 2,
                    opacity: 0.3,
                    fillOpacity: 0.1
                }).addTo(map).bindPopup(
                    `<b>${zone.name}</b><br>
                     Total Lots: ${zone.totalLots}<br>
                     Active Sessions: ${activeInZone}<br>
                     Compliance: ${complianceRate.toFixed(1)}%<br>
                     Status: ${style.text}`
                );

                zoneMarkers.push(marker, geofence);

                // Zone panel row
                const row = document.createElement('div');
                row.className = 'hotspot-row';
                row.innerHTML = `
                    <div class="street-name">${zone.name}</div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width:${complianceRate}%; background-color:${style.hex};"></div>
                    </div>
                    <div class="stat-line">
                        <span>${activeInZone} / ${zone.totalLots} Active</span>
                        <span style="color:${style.hex}; font-weight:600;">${complianceRate.toFixed(1)}%</span>
                    </div>
                `;
                list.appendChild(row);
            });

            // KPI totals
            document.getElementById('kpi-zones').textContent = zones.length;
            document.getElementById('kpi-sessions').textContent = totalSessions;
            const avgCompliance = zones.length > 0 ? totalCompliance / zones.length : 0;
            document.getElementById('kpi-compliance').textContent = avgCompliance.toFixed(1) + '%';

            document.getElementById('kpi-outside').textContent = activeOutside;

            // Refresh payer markers if currently visible
            if (payersVisible) renderPayers();
        }

        // Initial render
        // Directly load dummy data if available
        if (typeof DUMMY_ZONES !== 'undefined') {
            window.ZONES = DUMMY_ZONES;
            console.log('[Map] Loaded dummy zones:', window.ZONES.length);
        }
        if (typeof DUMMY_PAYMENT_SESSIONS !== 'undefined') {
            window.PAYMENT_SESSIONS = DUMMY_PAYMENT_SESSIONS;
            console.log('[Map] Loaded dummy payment sessions:', window.PAYMENT_SESSIONS.length);
        }
        setTimeout(renderZones, 1000);

        // Update zones when data changes
        setInterval(renderZones, 30000);

        // ---- Listen for theme changes from the parent shell ----
        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.type) return;
            if (e.data.type === 'theme') {
                document.documentElement.setAttribute('data-theme', e.data.value);
                applyTile(e.data.value);
            }
        });

        // ---- Hotspot panel collapse toggle ----
        function toggleHotspotPanel() {
            const panel = document.getElementById('hotspotPanel');
            const isOpen = panel.classList.toggle('open');
            sessionStorage.setItem('hotspotPanelOpen', isOpen ? 'true' : 'false');
        }

        // Restore collapsed state from session
        (function restoreHotspotState() {
            const saved = sessionStorage.getItem('hotspotPanelOpen');
            // Default is open (class 'open' already set in HTML).
            // Only collapse if user explicitly closed it this session.
            if (saved === 'false') {
                document.getElementById('hotspotPanel').classList.remove('open');
            }
        })();
    </script>
</body>

</html>
