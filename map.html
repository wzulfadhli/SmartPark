<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Overlay Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="theme.css">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* ---- Floating Header/Title ---- */
        .dashboard-title {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            color: var(--accent-success);
            font-weight: 700;
            pointer-events: none;
            font-size: 0.82rem;
            letter-spacing: 1.5px;
            box-shadow: var(--card-shadow);
            text-transform: uppercase;
        }

        /* ---- Top KPI Overlay ---- */
        .kpi-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 1000;
            max-width: calc(100% - 40px);
            justify-content: flex-end;
        }

        /* Override theme.css .card for the map overlay cards */
        .kpi-overlay .kpi-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 12px;
            min-width: 100px;
            text-align: center;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
        }

        .kpi-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .kpi-value {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            color: var(--text-primary);
        }

        /* ---- Hotspot Sidebar Panel ---- */
        .hotspot-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 280px;
            max-width: calc(100% - 40px);
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow);
            overflow: hidden; /* clip the collapsing body */
        }

        /* ---- Clickable header row ---- */
        .hotspot-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.25s, background 0.15s;
            border-radius: 12px 12px 0 0;
        }
        .hotspot-panel-header:hover {
            background: var(--surface-hover);
        }
        .hotspot-panel.open .hotspot-panel-header {
            border-bottom-color: var(--border-color);
            border-radius: 12px 12px 0 0;
        }

        .hotspot-panel-title {
            font-size: 0.72rem;
            color: var(--accent-success);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
        }

        /* Chevron icon — rotates 180° when panel is open */
        .hotspot-chevron {
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .hotspot-panel.open .hotspot-chevron {
            transform: rotate(180deg);
        }

        /* ---- Collapsible body ---- */
        .hotspot-panel-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.35s ease;
            padding: 0 15px;
        }
        .hotspot-panel.open .hotspot-panel-body {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            padding: 12px 15px;
        }

        .hotspot-row {
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .hotspot-row:last-child {
            border: 0;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .street-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .progress-track {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .stat-line {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* ---- Leaflet overrides ---- */
        .leaflet-control-zoom {
            border: none !important;
            margin-top: 20px !important;
        }

        .leaflet-control-zoom a {
            background-color: var(--surface-color) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }

        .leaflet-control-zoom a:hover {
            background-color: var(--surface-hover) !important;
        }

        .leaflet-control-attribution {
            background: var(--surface-color) !important;
            color: var(--text-secondary) !important;
        }

        .leaflet-control-attribution a {
            color: var(--accent-primary) !important;
        }

        /* Leaflet popup */
        .leaflet-popup-content-wrapper {
            background: var(--surface-color) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--card-shadow) !important;
            border-radius: 10px !important;
        }

        .leaflet-popup-tip {
            background: var(--surface-color) !important;
        }
    </style>
</head>

<body>
    <!-- Apply theme immediately from localStorage (same pattern as other pages) -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <div class="dashboard-title">Parking Sensor Map</div>

    <div class="kpi-overlay">
        <div class="kpi-card">
            <div class="kpi-label">Total Sensors</div>
            <div id="kpi-sensors" class="kpi-value">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Occupied</div>
            <div id="kpi-occupied" class="kpi-value">0</div>
        </div>
        <div class="kpi-card" style="border-top: 3px solid var(--accent-danger);">
            <div class="kpi-label">Unpaid</div>
            <div id="kpi-unpaid" class="kpi-value">0</div>
        </div>
    </div>

    <div class="hotspot-panel open" id="hotspotPanel">
        <div class="hotspot-panel-header" onclick="toggleHotspotPanel()" title="Toggle hotspot list">
            <span class="hotspot-panel-title">Live Hotspot Status</span>
            <i class="bi bi-chevron-up hotspot-chevron" id="hotspotChevron"></i>
        </div>
        <div class="hotspot-panel-body" id="hotspotBody">
            <div id="list-container"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ---- Data ----
        const hotspots = [
            { name: "Jalan SS15/4", lat: 3.0765, lon: 101.5890, sensors: 50, occupied: 45, paid: 12 },
            { name: "Jalan SS15/8", lat: 3.0750, lon: 101.5895, sensors: 40, occupied: 38, paid: 28 },
            { name: "USJ 10 Taipan", lat: 3.0485, lon: 101.5850, sensors: 120, occupied: 95, paid: 88 },
            { name: "Jalan SS16/1", lat: 3.0820, lon: 101.5865, sensors: 75, occupied: 30, paid: 28 }
        ];

        // ---- Tile URLs ----
        const TILE_DARK = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        const TILE_LIGHT = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        const TILE_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright"></a> <a href="https://carto.com/attributions"></a>';

        // ---- Map init ----
        const map = L.map('map', { zoomControl: true }).setView([3.07, 101.587], 15);

        let tileLayer = null;

        function applyTile(theme) {
            const url = theme === 'dark' ? TILE_DARK : TILE_LIGHT;
            if (tileLayer) map.removeLayer(tileLayer);
            tileLayer = L.tileLayer(url, {
                attribution: TILE_ATTR,
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        // Apply tile for current theme on load
        const initTheme = document.documentElement.getAttribute('data-theme') || 'light';
        applyTile(initTheme);

        // ---- Status helper ----
        function getStyle(occ, paid) {
            const ratio = (paid / occ) * 100;
            if (ratio < 50) return { color: 'var(--accent-danger)', hex: '#ef4444', text: 'Critical' };
            if (ratio <= 80) return { color: 'var(--accent-warning)', hex: '#f59e0b', text: 'Warning' };
            return { color: 'var(--accent-success)', hex: '#10b981', text: 'Healthy' };
        }

        // ---- Render hotspots ----
        let totalSens = 0, totalOcc = 0, totalPaid = 0;
        const list = document.getElementById('list-container');

        hotspots.forEach(spot => {
            const style = getStyle(spot.occupied, spot.paid);
            const compliance = (spot.paid / spot.occupied * 100).toFixed(0);

            totalSens += spot.sensors;
            totalOcc += spot.occupied;
            totalPaid += spot.paid;

            // Circle marker
            L.circleMarker([spot.lat, spot.lon], {
                radius: 14,
                fillColor: style.hex,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.75
            }).addTo(map).bindPopup(
                `<b>${spot.name}</b><br>
                 Total Spots: ${spot.sensors}<br>
                 Occupied: ${spot.occupied}<br>
                 Compliance: ${compliance}%`
            );

            // Hotspot panel row
            const row = document.createElement('div');
            row.className = 'hotspot-row';
            row.innerHTML = `
                <div class="street-name">${spot.name}</div>
                <div class="progress-track">
                    <div class="progress-fill" style="width:${compliance}%; background-color:${style.hex};"></div>
                </div>
                <div class="stat-line">
                    <span>${spot.occupied} Occupied</span>
                    <span style="color:${style.hex}; font-weight:600;">${compliance}% Paid</span>
                </div>
            `;
            list.appendChild(row);
        });

        // KPI totals
        document.getElementById('kpi-sensors').textContent = totalSens;
        document.getElementById('kpi-occupied').textContent = totalOcc;
        document.getElementById('kpi-unpaid').textContent = totalOcc - totalPaid;

        // ---- Listen for theme changes from the parent shell ----
        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.type) return;
            if (e.data.type === 'theme') {
                document.documentElement.setAttribute('data-theme', e.data.value);
                applyTile(e.data.value);
            }
        });

        // ---- Hotspot panel collapse toggle ----
        function toggleHotspotPanel() {
            const panel = document.getElementById('hotspotPanel');
            const isOpen = panel.classList.toggle('open');
            sessionStorage.setItem('hotspotPanelOpen', isOpen ? 'true' : 'false');
        }

        // Restore collapsed state from session
        (function restoreHotspotState() {
            const saved = sessionStorage.getItem('hotspotPanelOpen');
            // Default is open (class 'open' already set in HTML).
            // Only collapse if user explicitly closed it this session.
            if (saved === 'false') {
                document.getElementById('hotspotPanel').classList.remove('open');
            }
        })();
    </script>
</body>

</html>
