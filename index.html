<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartPark">
    <meta name="description" content="SmartPark 2.0 — GPS/Geofencing Parking Compliance System">
    <title>SmartPark 2.0</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="theme.css">

    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .app-shell {
            display: flex;
            height: 100vh;
            overflow: hidden;
            /* Prevent any horizontal overflow leaking out */
            max-width: 100vw;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease, min-width 0.25s ease;
            overflow: hidden;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
            min-width: var(--sidebar-collapsed-width);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-bottom: 1px solid var(--sidebar-border);
            min-height: 64px;
        }

        .sidebar-logo {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .sidebar.collapsed .sidebar-title {
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid var(--sidebar-border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
            margin-left: auto;
        }

        .sidebar-toggle:hover {
            background: var(--surface-hover);
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-x: hidden;
            /* nav labels are nowrap — never leak sideways */
            overflow-y: auto;
            /* allow scrolling when expanded */
        }

        /* Hide the scrollbar gutter when the sidebar is collapsed to 64 px */
        .sidebar.collapsed .sidebar-nav {
            overflow-y: hidden;
        }

        .nav-section-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            padding: 8px 10px 4px;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .sidebar.collapsed .nav-section-label {
            opacity: 0;
        }

        .nav-item-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            width: 100%;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
        }

        .nav-item-btn i {
            font-size: 1rem;
            flex-shrink: 0;
            color: var(--nav-icon-color);
            width: 20px;
            text-align: center;
            transition: color 0.15s;
        }

        .nav-item-btn:hover {
            background: var(--nav-active-bg);
            color: var(--text-primary);
        }

        .nav-item-btn:hover i {
            color: var(--text-primary);
        }

        .nav-item-btn.active {
            background: var(--nav-active-bg);
            color: var(--nav-active-color);
            font-weight: 600;
        }

        .nav-item-btn.active i {
            color: var(--nav-active-color);
        }

        .nav-label {
            transition: opacity 0.2s;
        }

        .sidebar.collapsed .nav-label {
            opacity: 0;
            pointer-events: none;
        }

        .nav-divider {
            height: 1px;
            background: var(--sidebar-border);
            margin: 6px 4px;
        }

        .sidebar-footer {
            padding: 10px 8px;
            border-top: 1px solid var(--sidebar-border);
        }

        /* ---- Main area ---- */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            /* prevent flex child from overflowing */
        }

        .topbar {
            height: 64px;
            min-height: 64px;
            background: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
        }

        .topbar-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Button shown in topbar to expand the sidebar when it is collapsed */
        .topbar-sidebar-toggle {
            display: none;
            /* hidden by default; shown via JS when sidebar is collapsed */
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .topbar-sidebar-toggle:hover {
            background: var(--surface-hover);
        }

        .topbar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .page-frame {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .frame-loader {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.2s;
        }

        .frame-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ---- Mobile ---- */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 99;
        }

        .sidebar-overlay.visible {
            display: block;
        }

        .mobile-menu-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .mobile-menu-btn:hover {
            background: var(--surface-hover);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                width: var(--sidebar-width) !important;
                min-width: var(--sidebar-width) !important;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: none;
            }

            .mobile-menu-btn {
                display: flex !important;
            }

            .topbar {
                padding: 0 16px;
            }
        }
    </style>
</head>

<body>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>

    <div class="offline-indicator" id="offlineIndicator">
        <i class="bi bi-wifi-off"></i>
        <span>You're offline — data will sync when back online</span>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

    <div class="install-prompt" id="installPrompt">
        <i class="bi bi-download" style="font-size: 22px; color: var(--accent-primary);"></i>
        <span style="font-size: 0.9rem; font-weight: 500;">Install SmartPark App</span>
        <button class="btn btn-primary btn-sm" onclick="installPWA()">Install</button>
        <button class="btn btn-link btn-sm text-muted" onclick="dismissInstall()">Later</button>
    </div>

    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="bi bi-p-square-fill"></i></div>
                <span class="sidebar-title">SmartPark</span>
                <button class="sidebar-toggle" onclick="toggleSidebar()" title="Collapse sidebar">
                    <i id="sidebarToggleIcon" class="bi bi-layout-sidebar-reverse"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <span class="nav-section-label">Dashboards</span>

                <button class="nav-item-btn active" id="nav-summary" onclick="navigate('summary')">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span class="nav-label">Summary</span>
                </button>

                <button class="nav-item-btn" id="nav-monitor" onclick="navigate('monitor')">
                    <i class="bi bi-activity"></i>
                    <span class="nav-label">Zone Monitor</span>
                </button>

                <button class="nav-item-btn" id="nav-map" onclick="navigate('map')">
                    <i class="bi bi-map-fill"></i>
                    <span class="nav-label">Compliance Map</span>
                </button>

                <div class="nav-divider" id="actionsDivider" style="display:none;"></div>
                <span class="nav-section-label" id="actionsLabel" style="display:none;">Actions</span>

                <button class="nav-item-btn" id="btnSimulate" style="display:none;"
                    onclick="broadcastToFrame({type:'simulate'})">
                    <i class="bi bi-car-front"></i>
                    <span class="nav-label">Simulate Session</span>
                </button>

                <button class="nav-item-btn" id="btnReset" style="display:none;"
                    onclick="broadcastToFrame({type:'reset'})">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    <span class="nav-label">Reset Sessions</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item-btn" onclick="toggleTheme()">
                    <i id="themeIcon" class="bi bi-moon-fill"></i>
                    <span class="nav-label">Toggle Theme</span>
                </button>
            </div>
        </aside>

        <!-- Main area -->
        <div class="main-area">
            <div class="topbar">
                <!-- Mobile hamburger -->
                <button class="mobile-menu-btn" onclick="openMobileSidebar()">
                    <i class="bi bi-list fs-5"></i>
                </button>
                <!-- Desktop: re-expand sidebar button (shown only when sidebar is collapsed) -->
                <button class="topbar-sidebar-toggle" id="topbarSidebarToggle" onclick="toggleSidebar()"
                    title="Expand sidebar">
                    <i class="bi bi-layout-sidebar"></i>
                </button>
                <span class="topbar-title" id="topbarTitle">Summary Dashboard</span>
                <div class="topbar-actions">
                    <span class="badge bg-secondary" style="font-size: 0.68em;">DEMO</span>
                    <button class="btn btn-sm btn-outline-secondary" onclick="syncFrame()" id="refreshBtn">
                        <i class="bi bi-arrow-clockwise"></i>
                        <span class="d-none d-md-inline ms-1">Sync</span>
                    </button>
                </div>
            </div>

            <div class="page-frame">
                <div class="frame-loader" id="frameLoader">
                    <div class="loader-spinner"></div>
                </div>
                <iframe id="pageFrame" src="dashboard.html" title="Page"></iframe>
            </div>
        </div>
    </div>

    <div class="notification-toast" id="notificationContainer"></div>

    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="geofencing-utils.js"></script>
    <script src="compliance-utils.js"></script>
    <script src="dummy-data.js"></script>
    <script src="app.js"></script>

    <script>
        const PAGES = {
            summary: { src: 'dashboard.html', title: 'Compliance Dashboard' },
            monitor: { src: 'monitor.html', title: 'Zone Monitor' },
            map: { src: 'map.html', title: 'Compliance Map' }
        };
        let currentPage = 'summary';

        function navigate(page) {
            if (currentPage === page) return;
            currentPage = page;
            document.querySelectorAll('.nav-item-btn[id^="nav-"]').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + page)?.classList.add('active');
            document.getElementById('topbarTitle').textContent = PAGES[page].title;
            document.getElementById('frameLoader').classList.remove('hidden');
            document.getElementById('pageFrame').src = PAGES[page].src;
            closeMobileSidebar();

            // Show action buttons only on Monitor
            const monitorOnly = page === 'monitor';
            const display = monitorOnly ? '' : 'none';
            document.getElementById('actionsDivider').style.display = display;
            document.getElementById('actionsLabel').style.display = display;
            document.getElementById('btnSimulate').style.display = display;
            document.getElementById('btnReset').style.display = display;
        }

        document.getElementById('pageFrame').addEventListener('load', () => {
            document.getElementById('frameLoader').classList.add('hidden');
            // Push current theme into new frame
            const t = localStorage.getItem('theme') || 'light';
            broadcastToFrame({ type: 'theme', value: t });
        });

        function broadcastToFrame(payload) {
            try { document.getElementById('pageFrame').contentWindow.postMessage(payload, '*'); }
            catch (e) { }
        }

        function syncFrame() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-clockwise bi-spin"></i><span class="d-none d-md-inline ms-1">Syncing…</span>';
            broadcastToFrame({ type: 'refresh' });
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i><span class="d-none d-md-inline ms-1">Sync</span>';
            }, 1000);
        }

        // Sidebar collapse
        let sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        function applyCollapsed() {
            const s = document.getElementById('sidebar');
            const i = document.getElementById('sidebarToggleIcon');
            const topbarBtn = document.getElementById('topbarSidebarToggle');
            s.classList.toggle('collapsed', sidebarCollapsed);
            i.className = sidebarCollapsed ? 'bi bi-layout-sidebar' : 'bi bi-layout-sidebar-reverse';
            // Show the topbar expand-button only when sidebar is collapsed (desktop)
            topbarBtn.style.display = sidebarCollapsed ? 'flex' : 'none';
        }
        function toggleSidebar() {
            sidebarCollapsed = !sidebarCollapsed;
            localStorage.setItem('sidebarCollapsed', sidebarCollapsed);
            applyCollapsed();
        }
        applyCollapsed();

        // Mobile sidebar
        function openMobileSidebar() {
            document.getElementById('sidebar').classList.add('mobile-open');
            document.getElementById('sidebarOverlay').classList.add('visible');
        }
        function closeMobileSidebar() {
            document.getElementById('sidebar').classList.remove('mobile-open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        }

        // Theme
        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeIcon').className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
            broadcastToFrame({ type: 'theme', value: next });
        }
        const _t = localStorage.getItem('theme') || 'light';
        document.getElementById('themeIcon').className = _t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';

        // Online/offline
        window.addEventListener('online', () => {
            document.getElementById('offlineIndicator').classList.remove('show');
            showShellNotification('Back online', 'success');
        });
        window.addEventListener('offline', () => {
            document.getElementById('offlineIndicator').classList.add('show');
            showShellNotification('Offline mode — data will sync when online', 'warning');
        });

        function showShellNotification(msg, type = 'info') {
            const cls = { info: 'bg-primary', success: 'bg-success', warning: 'bg-warning', danger: 'bg-danger' }[type];
            const t = `<div class="toast show align-items-center text-white ${cls} bg-opacity-80 border-0 mb-2" role="alert">
                <div class="d-flex"><div class="toast-body small"><i class="bi bi-info-circle me-2"></i>${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
            $('#notificationContainer').append(t);
            setTimeout(() => $('#notificationContainer .toast').first().fadeOut(300, function () { $(this).remove(); }), 4000);
        }

        // PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault(); deferredPrompt = e;
            setTimeout(() => {
                if (localStorage.getItem('pwaInstalled') !== 'true' && sessionStorage.getItem('pwaPromptShown') !== 'true') {
                    document.getElementById('installPrompt').style.display = 'flex';
                    sessionStorage.setItem('pwaPromptShown', 'true');
                }
            }, 3000);
        });
        function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(r => {
                if (r.outcome === 'accepted') localStorage.setItem('pwaInstalled', 'true');
                deferredPrompt = null;
                document.getElementById('installPrompt').style.display = 'none';
            });
        }
        function dismissInstall() {
            document.getElementById('installPrompt').style.display = 'none';
            sessionStorage.setItem('pwaPromptShown', 'true');
        }
        if (window.matchMedia('(display-mode: standalone)').matches) localStorage.setItem('pwaInstalled', 'true');

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    if (reg.waiting) showUpdateBanner(reg.waiting);
                    reg.addEventListener('updatefound', () => {
                        const w = reg.installing;
                        w.addEventListener('statechange', () => {
                            if (w.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner(w);
                        });
                    });
                }).catch(e => console.error('SW failed:', e));
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) { refreshing = true; window.location.reload(); }
                });
            });
        }
        function showUpdateBanner(worker) {
            window._updateWorker = worker;
            const t = `<div class="toast show align-items-center text-white border-0 mb-2" style="background:var(--accent-primary)">
                <div class="d-flex p-2"><div class="toast-body"><i class="bi bi-rocket-takeoff-fill me-2"></i>Update available!
                <button class="btn btn-sm btn-light ms-3 fw-bold" onclick="window._updateWorker.postMessage({type:'SKIP_WAITING'})">Update</button></div>
                <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
            $('#notificationContainer').append(t);
        }
    </script>
</body>

</html>
